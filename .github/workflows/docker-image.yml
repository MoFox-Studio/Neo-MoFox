name: Docker Build and Push

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY_USER: ikun11451
  IMAGE_BASE: neo-mofox

# Workflow's jobs
jobs:
  build-and-push:
    name: Build Multi-Arch Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Set up QEMU for cross-platform builds (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      # Log in docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build and push multi-arch image (amd64 + arm64)
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_USER }}/${{ env.IMAGE_BASE }}-${{ github.ref_name }}:buildcache,mode=max